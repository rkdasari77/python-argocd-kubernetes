<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopWave</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6fb;
      color: #1a1a2e;
    }

    /* ── NAV ── */
    nav {
      background: #1a1a2e;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { color: #f5c518; font-size: 1.5rem; font-weight: 700; letter-spacing: 1px; }
    .cart-link {
      background: #f5c518;
      color: #1a1a2e;
      padding: .5rem 1.2rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: white;
      text-align: center;
      padding: 3.5rem 1rem;
    }
    .hero h1 { font-size: 2.5rem; }
    .hero h1 span { color: #f5c518; }
    .hero p  { margin-top: .6rem; color: #aaa; font-size: 1.05rem; }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
      max-width: 1100px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      transition: transform .2s, box-shadow .2s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }

    .card-img {
      background: #f0f4ff;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }
    .card-body { padding: 1rem 1.2rem 1.2rem; }
    .card-cat  { font-size: .75rem; color: #888; text-transform: uppercase; letter-spacing: .06em; }
    .card-name { font-size: 1rem; font-weight: 600; margin: .25rem 0 .75rem; }
    .card-foot { display: flex; justify-content: space-between; align-items: center; }
    .price { font-size: 1.2rem; font-weight: 700; color: #1a1a2e; }
    .add-btn {
      background: #1a1a2e;
      color: white;
      padding: .45rem 1rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: .85rem;
      font-weight: 600;
      transition: background .2s;
    }
    .add-btn:hover { background: #f5c518; color: #1a1a2e; }

    footer {
      text-align: center;
      padding: 2rem;
      color: #888;
      font-size: .85rem;
      margin-top: 2rem;
      border-top: 1px solid #e0e0e0;
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">ShopWave</div>
  <a href="/cart" class="cart-link">🛒 Cart ({{ cart_count }})</a>
</nav>

<div class="hero">
  <h1>Welcome to <span>ShopWave</span></h1>
  <p>Deployed on Kubernetes via GitHub Actions + ArgoCD</p>
</div>

<div class="grid">
  {% for p in products %}
  <div class="card">
    <div class="card-img">{{ p.emoji }}</div>
    <div class="card-body">
      <div class="card-cat">{{ p.category }}</div>
      <div class="card-name">{{ p.name }}</div>
      <div class="card-foot">
        <span class="price">${{ "%.2f" | format(p.price) }}</span>
        <a href="/add/{{ p.id }}" class="add-btn">+ Add</a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>

<footer>ShopWave &copy; 2024 — Running on AKS</footer>
</body>
</html>
