apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopwave
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rkdasari77/python-argocd-kubernetes   # ← update this
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: shopwave
  syncPolicy:
    automated:
      prune: true          # delete resources removed from Git
      selfHeal: true       # revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true