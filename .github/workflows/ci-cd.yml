name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/shopwave

jobs:

  # ────────────────────────────────────────────
  # JOB 1 — Run Tests
  # ────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install flask==3.0.3 gunicorn==22.0.0 pytest==8.2.0

      - name: Run pytest
        run: |
          cd app
          python -m pytest test_app.py -v

  # ────────────────────────────────────────────
  # JOB 2 — Build & Push Docker Image
  # ────────────────────────────────────────────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

  # ────────────────────────────────────────────
  # JOB 3 — Update K8s Manifest
  # ────────────────────────────────────────────
  update-manifest:
    name: Update K8s Manifest
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in deployment.yaml
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          sed -i "s|image: .*shopwave.*|image: ${{ env.IMAGE_NAME }}:${TAG}|g" k8s/deployment.yaml
          echo "Updated image to ${{ env.IMAGE_NAME }}:${TAG}"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || \
            git commit -m "ci: update image to ${{ needs.build-push.outputs.image_tag }} [skip ci]"
          git push