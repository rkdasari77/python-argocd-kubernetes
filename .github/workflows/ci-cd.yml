name: CI/CD Pipeline — Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-app

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Test
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd app
          python -m pytest tests/ -v || echo "No tests found, skipping"

  # ─────────────────────────────────────────────
  # JOB 2: Build & Push Docker Image
  # ─────────────────────────────────────────────
  build-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3: Update K8s Manifest in GitOps Repo
  # ─────────────────────────────────────────────
  update-manifest:
    name: 📝 Update K8s Manifest (GitOps)
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout GitOps manifest repo
        uses: actions/checkout@v4
        with:
          # If manifest is a separate repo, use:
          # repository: your-org/ecommerce-gitops-manifests
          # token: ${{ secrets.GITOPS_PAT }}
          # For this demo, manifests are in the same repo under k8s/
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in deployment manifest
        env:
          NEW_TAG: sha-${{ github.sha }}
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:${NEW_TAG:0:14}"
          # Update the image field in deployment.yaml
          sed -i "s|image: .*ecommerce-app.*|image: ${IMAGE}|g" k8s/deployment.yaml
          echo "Updated manifest to use image: ${IMAGE}"

      - name: Commit and push updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "chore: update image tag to sha-${GITHUB_SHA:0:7} [skip ci]"
          git push